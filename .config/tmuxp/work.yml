session_name: uberall
windows:
  - window_name: work
    layout: 406d,85x48,0,0[85x32,0,0,0,85x15,0,33,30]
    panes:
      - shell_command: clear
      - shell_command: tmux resize-pane -Z -t uberall:work.1 ; clear
  - window_name: notes
    layout: 406d,85x48,0,0[85x32,0,0,0,85x15,0,33,30]
    shell_command_before:
      - cd ~/projects/notas/ # run as a first command in all panes
    panes:
      - shell_command:
        - nvim ~/projects/notas/trabalho/athenaworks/uberall/uberall-todo.md
      - shell_command: tmux resize-pane -Z -t uberall:notes.1 ; clear
  - window_name: database
    layout: 406d,85x48,0,0[85x32,0,0,0,85x15,0,33,30]
    shell_command_before:
      - ~/athenaworks/uberall/downloads/query && clear # run as a first command in all panes
    panes:
      - shell_command: nvim -c "DBUIToggle"  # top-left: editor with DBUI open
      - shell_command: tmux resize-pane -Z -t uberall:database.1 ; clear
  - window_name: code
    layout: 406d,85x48,0,0[85x32,0,0,0,85x15,0,33,30]
    shell_command_before:
      - cd ~/athenaworks/uberall/repos/ && clear ; eval (ssh-agent -c) # run as a first command in all panes
    panes:
      - shell_command: clear ; l
      - shell_command: clear && eval (ssh-agent -c) ; ssh-add ~/.ssh/uberall-2025-06 # bottom-left: terminal
  - window_name: e-mail
    layout: 406d,85x48,0,0[85x32,0,0,0,85x15,0,33,30]
    panes:
      - mailsync >> /dev/null ; neomutt
      - shell_command:
        - tmux resize-pane -Z -t uberall:e-mail.1 ; clear
